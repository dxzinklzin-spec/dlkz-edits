<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLKZ Edits</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
}.container { padding: 20px; }

img { width: 90%; max-width: 400px; border-radius: 10px; }

input, select { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }

button { background: red; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; }

button:hover { background: darkred; }

</style>
</head>
<body><div class="container">
    <h1>🔥 DLKZ EDITS 🔥</h1>
    <img src="sua-imagem.jpg" alt="banner"><h2>Peça sua edit 👇</h2>

<input type="text" id="nome" placeholder="Seu nome">
<select id="tipo">
    <option>Anime</option>
    <option>Futebol</option>
    <option>Foto</option>
    <option>Clips</option>
</select>
<input type="text" id="detalhe" placeholder="Como você quer a edit?">

<button onclick="enviar()">Enviar</button>

<p id="msg"></p>

</div><script>
function enviar() {
    let nome = document.getElementById('nome').value;
    let tipo = document.getElementById('tipo').value;
    let detalhe = document.getElementById('detalhe').value;

    let texto = `Nome: ${nome}%0ATipo: ${tipo}%0ADetalhes: ${detalhe}`;

    let numero = "5511951319587"; // COLOCA SEU NÚMERO AQUI

    let url = `https://wa.me/${numero}?text=${texto}`;

    window.open(url, '_blank');

    document.getElementById('msg').innerText = "Obrigado por responder!!";
}
</script></body>
</html>
