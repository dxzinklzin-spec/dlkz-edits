<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLKZ PANEL</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
}

/* CENTRAL */
.container {
    max-width: 420px;
    margin: auto;
    margin-top: 60px;
    text-align: center;
}

/* TÍTULO */
h1 {
    color: red;
    margin-bottom: 20px;
    text-shadow: 0 0 10px red;
}

/* CARD */
.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    border: 1px solid red;
    box-shadow: 0 0 15px rgba(255,0,0,0.2);
}

/* MENU */
.menu button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    background: #111;
    border: 1px solid red;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.menu button:hover {
    background: #1a1a1a;
    box-shadow: 0 0 10px red;
}

/* INPUT */
select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
}

/* BOTÃO */
.btn {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    background: red;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.btn:hover {
    background: darkred;
}

/* VOLTAR */
.back {
    background: transparent;
    border: 1px solid red;
}

/* TELAS */
.screen {
    display: none;
}
.active {
    display: block;
}
</style>
</head>

<body>

<div class="container">

<h1>DLKZ PANEL 😈</h1>

<!-- MENU -->
<div id="menu" class="card screen active">
    <div class="menu">
        <button onclick="abrir('pagamento')">💰 Forma de pagamento</button>
        <button onclick="abrir('pedido')">🎬 Fazer pedido</button>
        <button onclick="zap()">📱 Chamar no WhatsApp</button>
    </div>
</div>

<!-- PAGAMENTO -->
<div id="pagamento" class="card screen">
    <h3>💰 Pagamento</h3>
    <p>PIX 💸</p>

    <button class="btn back" onclick="voltar()">⬅️ Voltar</button>
</div>

<!-- PEDIDO -->
<div id="pedido" class="card screen">
    <h3>🎬 Pedido</h3>

    <select id="tipo">
        <option>Anime</option>
        <option>Futebol</option>
        <option>Marca d'água</option>
        <option>Foto</option>
    </select>

    <textarea id="desc" placeholder="Descreva seu pedido..."></textarea>

    <button class="btn" onclick="enviar()">Enviar pedido</button>
    <button class="btn back" onclick="voltar()">⬅️ Voltar</button>
</div>

</div>

<script>
function abrir(tela) {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(tela).classList.add('active');
}

function voltar() {
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById('menu').classList.add('active');
}

function zap() {
    let numero = "5511951319587";
    let mensagem = "Oi, vim pelo painel DLKZ!";
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank");
}

function enviar() {
    let tipo = document.getElementById("tipo").value;
    let desc = document.getElementById("desc").value;

    let mensagem =
`📩 Pedido DLKZ

🎬 Tipo: ${tipo}

📝 ${desc}`;

    let numero = "5511951319587";

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank");
}
</script>

</body>
</html>
