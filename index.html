<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLKZ EDITS</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(black, #1a0000);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.banner {
    width: 100%;
    max-width: 400px;
    border-radius: 10px;
    box-shadow: 0 0 20px red;
}

input, select {
    width: 80%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: #111;
    color: white;
}

button {
    background: red;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: darkred;
}

h1 {
    text-shadow: 0 0 10px red;
}

</style>
</head>

<body>

<div class="container">

    <h1>🔥 DLKZ EDITS 🔥</h1>

    <!-- BANNER COM PREÇOS -->
    <img src="banner.jpg" class="banner">

    <h2>Peça sua edit 👇</h2>

    <input type="text" id="nome" placeholder="Seu nome">

    <select id="tipo">
        <option>Foto</option>
        <option>Anime</option>
        <option>Futebol</option>
        <option>Clips</option>
        <option>Overlay</option>
    </select>

    <input type="text" id="detalhe" placeholder="Como você quer a edit?">

    <button onclick="enviar()">Enviar</button>

    <p id="msg"></p>

</div>

<script>
function enviar() {
    let nome = document.getElementById('nome').value;
    let tipo = document.getElementById('tipo').value;
    let detalhe = document.getElementById('detalhe').value;

    let texto = `🔥 NOVO PEDIDO 🔥%0A%0ANome: ${nome}%0ATipo: ${tipo}%0ADetalhes: ${detalhe}`;

    let numero = "5511951319587"; // COLOCA SEU NÚMERO

    let url = `https://wa.me/${numero}?text=${texto}`;

    window.open(url, '_blank');

    document.getElementById('msg').innerText = "Obrigado por responder!!";
}
</script>

</body>
</html>
