<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLKZ MOTION</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow: hidden;
    background: black;
}

/* FUNDO SIMPLES E BONITO */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #220000, black 80%);
    z-index: -1;
}

/* SLIDE */
.container {
    display: flex;
    width: 200%;
    transition: 0.5s;
}

.page {
    width: 100vw;
    height: 100vh;
    padding: 40px;
    box-sizing: border-box;
    border: 2px solid red;
}

/* INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#intro h1 {
    color: red;
    font-size: 50px;
    animation: piscar 1s infinite;
}

@keyframes piscar {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

/* BOTÕES */
.btn {
    margin-top: 20px;
    padding: 15px 25px;
    background: red;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: darkred;
    transform: scale(1.05);
}

h1 {
    color: red;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>DLKZ MOTION</h1>
</div>

<div id="site" style="display:none;">

<div class="container" id="container">

<!-- PÁGINA 1 -->
<div class="page">
    <h1>Oiiii, tudo bem? 👋</h1>
    <p>
    Aqui é o dlkz77cc 🎬<br>
    Editor de vídeo profissional<br>
    Clique para ver mais 👉
    </p>

    <button class="btn" onclick="irPagina(1)">VER MAIS ➡️</button>
    <br>
    <button class="btn" onclick="zap()">WHATSAPP 📩</button>
</div>

<!-- PÁGINA 2 -->
<div class="page">
    <h1>💰 PAGAMENTO</h1>

    <p style="font-size:20px;">
    💸 PIX<br><br>
    Pagamento rápido e seguro ⚡
    </p>

    <button class="btn" onclick="irPagina(0)">⬅️ VOLTAR</button>
</div>

</div>

</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("site").style.display = "block";
    }, 2000);
};

function irPagina(num) {
    document.getElementById("container").style.transform = "translateX(-" + (num * 100) + "vw)";
}

function zap() {
    let numero = "5511951319587";
    let mensagem = "Oi, vim pelo site DLKZ e quero um edit!";
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank");
}
</script>

</body>
</html>
