<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLKZ MOTION</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* FUNDO SUKUNA */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,0,0,0.3), black 70%);
    animation: pulse 3s infinite alternate;
    z-index: -1;
}

@keyframes pulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 30px;
}

/* TÍTULO */
h1 {
    color: red;
    text-align: center;
}

/* CARD */
.card {
    background: #111;
    padding: 20px;
    margin-top: 20px;
    border-radius: 15px;
    border: 1px solid red;
}

/* SELECT / INPUT */
select, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
}

/* BOTÃO */
button {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    background: red;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: darkred;
}
</style>
</head>

<body>

<div class="container">

<h1>DLKZ MOTION 😈</h1>

<!-- PAGAMENTO -->
<div class="card">
    <h3>💰 Forma de pagamento</h3>
    <select id="pagamento">
        <option>PIX</option>
    </select>
</div>

<!-- PEDIDO -->
<div class="card">
    <h3>🎬 Tipo de edit</h3>
    <select id="tipo">
        <option>Anime</option>
        <option>Futebol</option>
        <option>Marca d'água</option>
        <option>Foto</option>
    </select>

    <h3>✍️ Descrição</h3>
    <textarea id="desc" placeholder="Descreva seu pedido..."></textarea>
</div>

<!-- BOTÃO -->
<button onclick="enviar()">CHAMAR NO WHATSAPP 🔥</button>

</div>

<script>
function enviar() {
    let pagamento = document.getElementById("pagamento").value;
    let tipo = document.getElementById("tipo").value;
    let desc = document.getElementById("desc").value;

    let mensagem = 
`📩 Pedido DLKZ

💰 Pagamento: ${pagamento}
🎬 Tipo: ${tipo}

📝 Descrição:
${desc}`;

    let numero = "5511951319587";

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank");
}
</script>

</body>
</html>
